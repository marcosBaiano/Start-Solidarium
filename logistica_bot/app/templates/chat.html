<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogBot — Assistente Logístico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & VARIÁVEIS ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --panel:     #13161d;
      --surface:   #1a1e28;
      --border:    #252a38;
      --accent:    #00c2a8;
      --accent2:   #0066ff;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --bot-msg:   #1a1e28;
      --user-msg:  #003380;
      --radius:    14px;
      --font:      'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ─── LAYOUT PRINCIPAL ──────────────────────────────────── */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SIDEBAR ───────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px 28px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text strong {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .logo-text span {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sidebar-nav {
      padding: 20px 12px;
      flex: 1;
    }

    .nav-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      transition: all 0.15s;
      user-select: none;
    }

    .nav-item:hover    { background: var(--surface); color: var(--text); }
    .nav-item.active   { background: rgba(0,194,168,.12); color: var(--accent); }

    .nav-item .icon    { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ─── ÁREA DO CHAT ──────────────────────────────────────── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header do chat */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .chat-title {
      font-weight: 600;
      font-size: 15px;
    }

    .chat-subtitle {
      font-size: 12px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-subtitle::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    /* Mensagens */
    .messages-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages-wrapper::-webkit-scrollbar       { width: 5px; }
    .messages-wrapper::-webkit-scrollbar-track  { background: transparent; }
    .messages-wrapper::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 4px; }

    /* Balão de mensagem */
    .msg {
      display: flex;
      gap: 12px;
      max-width: 76%;
      animation: slideIn .2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .msg.bot  .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .msg.user .msg-avatar { background: var(--user-msg); }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.bot  .msg-bubble {
      background: var(--bot-msg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .msg.user .msg-bubble {
      background: var(--user-msg);
      border: 1px solid rgba(0,102,255,.3);
      border-top-right-radius: 4px;
      color: #c8d8ff;
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg.user .msg-time { text-align: right; }

    /* Indicador de digitando */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 12px;
      align-self: flex-start;
      animation: slideIn .2s ease;
    }

    .typing-indicator.visible { display: flex; }

    .typing-bubble {
      background: var(--bot-msg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: .5; }
      40%          { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── INPUT ─────────────────────────────────────────────── */
    .input-area {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color .2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      min-height: 22px;
    }

    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .15s;
      color: #000;
      font-size: 17px;
    }

    #send-btn:hover    { background: #00dfc0; transform: scale(1.05); }
    #send-btn:active   { transform: scale(.95); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      padding-left: 2px;
    }

    /* ─── SUGESTÕES RÁPIDAS ─────────────────────────────────── */
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .quick-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .messages-wrapper { padding: 16px; }
      .input-area { padding: 14px 16px; }
      .msg { max-width: 90%; }
    }
  </style>
</head>

<body>
<div class="app-shell">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🚚</div>
      <div class="logo-text">
        <strong>LogBot</strong>
        <span>Logística Inteligente</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <div class="nav-item active">
        <span class="icon">💬</span> Chat de Suporte
      </div>
      <div class="nav-item">
        <span class="icon">📦</span> Pedidos
      </div>
      <div class="nav-item">
        <span class="icon">📊</span> Dashboard
      </div>
      <div class="nav-item">
        <span class="icon">🗺️</span> Rotas
      </div>
      <div class="nav-item">
        <span class="icon">🎫</span> Chamados
      </div>
      <div class="nav-item">
        <span class="icon">⚙️</span> Configurações
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="status-badge">
        <div class="status-dot"></div>
        Sistema operacional
      </div>
    </div>
  </aside>

  <!-- ── CHAT ────────────────────────────────────────────── -->
  <main class="chat-area">

    <header class="chat-header">
      <div class="chat-header-left">
        <div class="avatar">🤖</div>
        <div>
          <div class="chat-title">Assistente LogBot</div>
          <div class="chat-subtitle">Online agora</div>
        </div>
      </div>
    </header>

    <div class="messages-wrapper" id="messages">
      <!-- Mensagens inseridas via JS -->
    </div>

    <!-- Indicador de digitando -->
    <div class="typing-indicator" id="typing" style="padding: 0 28px 12px;">
      <div class="msg-avatar" style="background:linear-gradient(135deg,#00c2a8,#0066ff);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;">🤖</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div class="input-area">
      <div class="quick-actions" id="quick-actions">
        <button class="quick-btn" onclick="enviarRapido('Rastrear pedido')">📦 Rastrear pedido</button>
        <button class="quick-btn" onclick="enviarRapido('Status da entrega')">📊 Status</button>
        <button class="quick-btn" onclick="enviarRapido('Localização')">📍 Localização</button>
        <button class="quick-btn" onclick="enviarRapido('Preciso de suporte')">👨‍💻 Suporte</button>
      </div>
      <div class="input-row">
        <textarea
          id="msg-input"
          placeholder="Digite sua mensagem..."
          rows="1"
          autocomplete="off"
        ></textarea>
        <button id="send-btn" title="Enviar (Enter)">➤</button>
      </div>
      <div class="input-hint">Pressione Enter para enviar · Shift+Enter para nova linha</div>
    </div>

  </main>
</div>

<script>
// ─── ESTADO ───────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const typingEl   = document.getElementById('typing');

// ─── UTILS ────────────────────────────────────────────────────
function horaAtual() {
  return new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function scrollFinal() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ─── RENDERIZAR MENSAGEM ───────────────────────────────────────
function adicionarMensagem(texto, tipo) {
  const div = document.createElement('div');
  div.className = `msg ${tipo}`;

  const avatarIcon = tipo === 'bot' ? '🤖' : '👤';

  div.innerHTML = `
    <div class="msg-avatar">${avatarIcon}</div>
    <div>
      <div class="msg-bubble">${escaparHTML(texto)}</div>
      <div class="msg-time">${horaAtual()}</div>
    </div>
  `;

  messagesEl.appendChild(div);
  scrollFinal();
}

function escaparHTML(txt) {
  return txt
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*(.+?)\*/g, '<strong>$1</strong>')   // *negrito*
    .replace(/\n/g, '<br>');
}

// ─── INDICADOR DIGITANDO ──────────────────────────────────────
function mostrarDigitando() {
  typingEl.classList.add('visible');
  scrollFinal();
}

function ocultarDigitando() {
  typingEl.classList.remove('visible');
}

// ─── ENVIO ────────────────────────────────────────────────────
async function enviarMensagem() {
  const texto = inputEl.value.trim();
  if (!texto) return;

  // Exibe mensagem do usuário
  adicionarMensagem(texto, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  // Oculta ações rápidas após primeira mensagem
  document.getElementById('quick-actions').style.display = 'none';

  // Indicador digitando
  mostrarDigitando();

  try {
    const resp = await fetch('/api/mensagem', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mensagem: texto })
    });

    const data = await resp.json();
    ocultarDigitando();
    adicionarMensagem(data.resposta || 'Erro ao obter resposta.', 'bot');

  } catch (err) {
    ocultarDigitando();
    adicionarMensagem('Erro de conexão. Verifique sua internet. 🔌', 'bot');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function enviarRapido(texto) {
  inputEl.value = texto;
  enviarMensagem();
}

// ─── AUTO-RESIZE TEXTAREA ─────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ─── ENVIO POR ENTER ──────────────────────────────────────────
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    enviarMensagem();
  }
});

sendBtn.addEventListener('click', enviarMensagem);

// ─── MENSAGEM DE BOAS-VINDAS (dispara ao abrir o chat) ────────
window.addEventListener('load', () => {
  // Manda "oi" silencioso para o bot iniciar o fluxo de cadastro
  setTimeout(async () => {
    mostrarDigitando();
    try {
      const resp = await fetch('/api/mensagem', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensagem: 'oi' })
      });
      const data = await resp.json();
      ocultarDigitando();
      adicionarMensagem(data.resposta, 'bot');
    } catch {
      ocultarDigitando();
      adicionarMensagem('Olá! 👋 Como posso ajudar?', 'bot');
    }
    inputEl.focus();
  }, 600);
});
</script>
</body>
</html>

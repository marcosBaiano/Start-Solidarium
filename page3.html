<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Coleta - Confirmação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <img src="assets/logo.png" alt="Logo da Empresa" class="logo" />
        </header>
        <main class="content">
            <section class="center-box">
                <h2 class="form-title">Coleta Agendada com Sucesso!</h2>
                
                <div class="confirmation-box">
                    <p>Sua coleta foi agendada com sucesso.</p>
                    <p>Um coletor passará em sua residência em breve.</p>
                </div>

                <button class="btn" onclick="window.location.href='index.html'">Fazer Nova Coleta</button>
            </section>
        </main>
        <div class="button-group" style="margin-top: 20px;">
            <button class="btn-secondary" onclick="window.location.href='page-2.html'">Voltar</button>
        </div>
    </div>
</body>
</html>

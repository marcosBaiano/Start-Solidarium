<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Coleta - Mapa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <img src="assets/logo.png" alt="Logo da Empresa" class="logo" />
        </header>
        <main class="content">
            <section class="map-section">
                <div id="map"></div>
            </section>
            <div class="button-group">
                <button class="btn" onclick="window.location.href='page-2.html'">Próximo</button>
                <button class="btn-secondary" onclick="window.location.href='index.html'">Voltar</button>
            </div>
        </main>
    </div>

    <script>
        var map = L.map('map').setView([-3.7319, -38.5267], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        L.marker([-3.7319, -38.5267]).addTo(map)
            .bindPopup('Você está aqui!')
            .openPopup();
    </script>
</body>
</html>

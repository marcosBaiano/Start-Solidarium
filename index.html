<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Coleta de Resíduos - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <img src="assets/logo.png" alt="Logo da Empresa" class="logo" />
        </header>
        <main class="content">
            <section class="form-box">
                <h1 class="form-title">Se cadastre aqui</h1>

                <div class="form-group">
                    <label>Tipo de residência</label>
                    <input type="text" placeholder="Casa, apartamento..." />
                </div>

                <div class="form-group">
                    <label>Informe seu CEP</label>
                    <input type="text" placeholder="00000-000" />
                </div>

                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" placeholder="Seu nome" />
                </div>

                <button class="btn" onclick="window.location.href='page.html'">Cadastrar-se</button>
            </section>
        </main>
    </div>
</body>
</html>
